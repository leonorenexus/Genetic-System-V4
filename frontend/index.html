<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SYNC — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Bungee';src:url('Bungee.ttf') format('truetype');font-weight:normal;font-style:normal;font-display:swap;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#04070e;
  --card-bg:#070f1c;
  --border:rgba(79,141,255,.1);
  --border2:rgba(79,141,255,.2);
  --border3:rgba(79,141,255,.4);
  --accent:#4f8dff;
  --accent2:#7eabff;
  --accent3:#b8d3ff;
  --glow:rgba(79,141,255,.18);
  --red:#e05c5c;
  --tele:#229ED9;
  --tiktok:#fff;
  --text:#e8f0ff;
  --t2:#4a6a9a;
  --t3:#1a2d4a;
  --mono:'IBM Plex Mono',monospace;
  --display:'Playfair Display',serif;
  --sans:'Syne',sans-serif;
}

html,body{height:100%}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(79,141,255,.09) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 90% 70%, rgba(79,141,255,.05) 0%, transparent 60%),
    radial-gradient(ellipse 30% 40% at 10% 80%, rgba(79,141,255,.04) 0%, transparent 60%);
}

body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(79,141,255,.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,141,255,.015) 1px, transparent 1px);
  background-size:48px 48px;
}

/* Floating orbs */
body::after{
  content:'';
  position:fixed;
  width:300px;height:300px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(79,141,255,.06) 0%, transparent 70%);
  top:-80px;right:-80px;
  pointer-events:none;z-index:0;
  animation:orb 8s ease-in-out infinite alternate;
}

@keyframes orb{
  from{transform:translate(0,0) scale(1);}
  to{transform:translate(-30px,30px) scale(1.1);}
}

.page-wrap{
  position:relative;z-index:1;
  width:100%;
  max-width:420px;
  display:flex;flex-direction:column;
  gap:0;
  animation:fadeUp .55s cubic-bezier(.22,1,.36,1) both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(32px)}
  to{opacity:1;transform:none}
}

/* ── BANNER ── */
.banner{
  width:100%;
  aspect-ratio:16/9;
  border-radius:22px 22px 0 0;
  overflow:hidden;
  position:relative;
  border:1px solid var(--border2);
  border-bottom:none;
  flex-shrink:0;
}

.banner img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  filter:brightness(.8) saturate(1.15);
}

.banner-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(4,7,14,0) 0%,
    rgba(4,7,14,.1) 50%,
    rgba(4,7,14,.82) 100%
  );
}

/* Shimmer line top */
.banner::after{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent, rgba(79,141,255,.6), rgba(126,171,255,.8), rgba(79,141,255,.6), transparent);
  z-index:2;
}

.banner-brand{
  position:absolute;bottom:16px;left:20px;right:20px;
  display:flex;align-items:flex-end;justify-content:space-between;
  z-index:2;
}

.banner-text-group{
  display:flex;flex-direction:column;gap:2px;
}

.banner-name{
  font-family:'Bungee',sans-serif;
  font-size:26px;
  letter-spacing:3px;
  text-shadow:0 2px 24px rgba(0,0,0,.8);
  line-height:1;
}

.banner-tag{
  font-family:var(--mono);
  font-size:7.5px;
  color:rgba(184,211,255,.65);
  letter-spacing:3px;
  text-transform:uppercase;
}



/* ── CARD ── */
.login-card{
  width:100%;
  background:var(--card-bg);
  border:1px solid var(--border2);
  border-top:none;
  border-radius:0 0 22px 22px;
  padding:26px 24px 24px;
  box-shadow:
    0 40px 100px rgba(0,0,0,.75),
    inset 0 0 0 1px rgba(255,255,255,.02);
  position:relative;
  overflow:hidden;
}

/* inner shimmer top */
.login-card::before{
  content:'';
  position:absolute;top:0;left:20px;right:20px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(79,141,255,.3),transparent);
}

/* blue glow bottom-left */
.login-card::after{
  content:'';
  position:absolute;bottom:-60px;left:-40px;
  width:200px;height:200px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(79,141,255,.07) 0%, transparent 70%);
  pointer-events:none;
}

/* ── HEADER ── */
.card-header{
  margin-bottom:22px;
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:10px;
}

.card-title-group{}

.card-title{
  font-family:var(--display);
  font-size:20px;font-weight:400;font-style:italic;
  color:var(--text);
  letter-spacing:.5px;line-height:1.2;
  margin-bottom:4px;
}

.card-sub{
  font-family:var(--mono);
  font-size:8.5px;
  color:var(--t2);
  letter-spacing:2.5px;
  text-transform:uppercase;
}

.divider-line{
  width:28px;height:1.5px;
  background:linear-gradient(90deg, var(--accent), transparent);
  opacity:.5;
  margin-top:10px;
}

/* Save account badge */
.save-badge{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

.save-btn{
  width:38px;height:38px;
  border-radius:10px;
  border:1px solid rgba(79,141,255,.2);
  background:rgba(79,141,255,.06);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s ease;
  position:relative;
}

.save-btn:hover{
  border-color:rgba(79,141,255,.45);
  background:rgba(79,141,255,.12);
  box-shadow:0 0 16px rgba(79,141,255,.15);
}

.save-btn.saved{
  border-color:rgba(79,200,120,.5);
  background:rgba(79,200,120,.1);
  box-shadow:0 0 12px rgba(79,200,120,.15);
}

.save-btn svg{transition:all .2s ease;}

.save-label{
  font-family:var(--mono);
  font-size:7px;
  color:var(--t2);
  letter-spacing:1.5px;
  text-transform:uppercase;
}

/* ── FIELDS ── */
.field{margin-bottom:13px}

.field-label{
  font-family:var(--sans);
  font-size:9.5px;font-weight:700;
  color:var(--t2);
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:6px;display:block;
}

.field-wrap{position:relative}

.field-icon{
  position:absolute;left:13px;top:50%;
  transform:translateY(-50%);
  color:var(--t3);
  pointer-events:none;
  transition:color .2s;
}

.field-input{
  width:100%;height:46px;
  background:rgba(79,141,255,.025);
  border:1.5px solid rgba(79,141,255,.1);
  border-radius:12px;
  color:var(--text);
  font-family:var(--mono);font-size:12px;
  padding:0 14px 0 38px;
  outline:none;
  transition:border-color .2s, background .2s, box-shadow .2s;
  letter-spacing:.3px;
  -webkit-appearance:none;
}

.field-input:focus{
  border-color:rgba(79,141,255,.45);
  background:rgba(79,141,255,.055);
  box-shadow:0 0 0 3px rgba(79,141,255,.08), 0 0 20px rgba(79,141,255,.06);
}

.field-wrap:focus-within .field-icon{color:var(--accent2)}
.field-input::placeholder{color:var(--t3);font-style:italic}

.pwd-toggle{
  position:absolute;right:11px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;padding:5px;
  cursor:pointer;color:var(--t2);
  display:flex;align-items:center;
  transition:color .2s;
  -webkit-tap-highlight-color:transparent;
}
.pwd-toggle:hover{color:var(--accent2)}

/* ── REMEMBER ROW ── */
.remember-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;margin-top:2px;
}

.remember-check{
  display:flex;align-items:center;gap:7px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}

.custom-check{
  width:16px;height:16px;
  border:1.5px solid rgba(79,141,255,.25);
  border-radius:4px;
  background:rgba(79,141,255,.04);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s ease;
  flex-shrink:0;
}

.custom-check.checked{
  background:rgba(79,141,255,.2);
  border-color:rgba(79,141,255,.5);
}

.remember-label{
  font-family:var(--mono);font-size:9px;
  color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;
}

/* ── LOGIN BUTTON ── */
.btn-login{
  width:100%;height:50px;
  border-radius:13px;
  border:1px solid rgba(79,141,255,.3);
  background:linear-gradient(135deg, rgba(79,141,255,.16) 0%, rgba(79,141,255,.07) 100%);
  color:var(--accent2);
  font-family:var(--sans);font-size:11.5px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;
  cursor:pointer;
  transition:all .18s ease;
  box-shadow:
    0 4px 24px rgba(79,141,255,.1),
    inset 0 1px 0 rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;gap:9px;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

.btn-login::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(79,141,255,.14), transparent 60%);
  opacity:0;transition:opacity .2s;
}

.btn-login:hover::before{opacity:1}
.btn-login:hover{
  border-color:rgba(79,141,255,.5);
  box-shadow:0 8px 40px rgba(79,141,255,.18), inset 0 1px 0 rgba(255,255,255,.07);
  transform:translateY(-1px);
}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.35;pointer-events:none}

.btn-login .spinner{
  display:none;
  width:15px;height:15px;
  border:1.5px solid rgba(126,171,255,.2);
  border-top-color:var(--accent2);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
.btn-login.loading .spinner{display:block}
.btn-login.loading .btn-text{display:none}

@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast-wrap{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;align-items:center;gap:10px;
  pointer-events:none;width:calc(100% - 40px);max-width:380px;
}
.toast{
  width:100%;
  background:rgba(5,9,18,.97);
  border:1px solid rgba(224,92,92,.2);
  border-left:3px solid #e05c5c;
  border-radius:14px;
  padding:13px 16px;
  display:flex;align-items:flex-start;gap:12px;
  backdrop-filter:blur(28px);
  box-shadow:0 16px 48px rgba(0,0,0,.65),0 0 32px rgba(224,92,92,.06);
  animation:toastIn .35s cubic-bezier(.22,1,.36,1) both;
  pointer-events:all;
  position:relative;overflow:hidden;
}
.toast.success{
  border-color:rgba(79,200,120,.2);
  border-left-color:#4fc878;
  box-shadow:0 16px 48px rgba(0,0,0,.65),0 0 32px rgba(79,200,120,.06);
}
.toast.hide{animation:toastOut .2s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-8px) scale(.97)}}

.toast-icon-wrap{
  width:28px;height:28px;border-radius:8px;
  background:rgba(224,92,92,.1);
  border:1px solid rgba(224,92,92,.18);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.toast.success .toast-icon-wrap{
  background:rgba(79,200,120,.1);
  border-color:rgba(79,200,120,.2);
}
.toast-body{flex:1;min-width:0}
.toast-title{
  font-family:var(--sans);font-size:10.5px;font-weight:700;
  color:#f08080;letter-spacing:1px;text-transform:uppercase;
  margin-bottom:3px;
}
.toast.success .toast-title{color:#6ee09a}
.toast-msg{
  font-family:var(--mono);font-size:9.5px;
  color:rgba(220,170,170,.7);letter-spacing:.3px;line-height:1.5;
}
.toast.success .toast-msg{color:rgba(150,220,170,.7)}
.toast-progress{
  position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,#e05c5c,rgba(224,92,92,.3));
  border-radius:0 0 0 14px;
  animation:toastProgress 3s linear forwards;
}
.toast.success .toast-progress{
  background:linear-gradient(90deg,#4fc878,rgba(79,200,120,.3));
}
@keyframes toastProgress{from{width:100%}to{width:0%}}

/* ── SOCIAL ROW ── */
.social-row{
  display:flex;gap:10px;
  margin-top:12px;
}

.soc-btn{
  flex:1;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 12px;
  border-radius:13px;
  font-family:var(--sans);font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  text-decoration:none;
  transition:all .2s ease;
  border:1px solid transparent;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

.soc-btn.tele{
  background:rgba(34,158,217,.1);
  border-color:rgba(34,158,217,.28);
  color:#62d0ff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.soc-btn.tele:hover{
  background:rgba(34,158,217,.2);
  border-color:rgba(34,158,217,.55);
  box-shadow:0 4px 20px rgba(34,158,217,.2);
  transform:translateY(-1px);
}

.soc-btn.tiktok{
  background:rgba(255,255,255,.05);
  border-color:rgba(255,255,255,.12);
  color:rgba(255,255,255,.75);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.soc-btn.tiktok:hover{
  background:rgba(255,255,255,.1);
  border-color:rgba(255,255,255,.28);
  box-shadow:0 4px 20px rgba(255,255,255,.07);
  transform:translateY(-1px);
}

/* ── FOOTER ── */
.page-footer{
  text-align:center;
  font-family:var(--mono);font-size:7.5px;
  color:rgba(74,106,154,.45);
  letter-spacing:2.5px;text-transform:uppercase;
  margin-top:18px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}

.footer-dot{
  width:3px;height:3px;border-radius:50%;
  background:rgba(79,141,255,.3);
}
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<div class="page-wrap">

  <!-- BANNER -->
  <div class="banner">
    <img src="l.gif" alt="SYNC Banner">
    <div class="banner-overlay"></div>
    <div class="banner-brand">
      <div class="banner-text-group">
        <div class="banner-name">
          <span style="color:#ffffff">WELCOME</span><span style="color:#4f8dff">BACK</span>
        </div>
        <div class="banner-tag">Created By Leonore</div>
      </div>

    </div>
  </div>

  <!-- LOGIN CARD -->
  <div class="login-card">

    <!-- Header -->
    <div class="card-header">
      <div class="card-title-group">
        <div class="card-title">Masuk ke akun kamu</div>
        <div class="card-sub">Secure · Encrypted · Private</div>
        <div class="divider-line"></div>
      </div>
      <!-- Save Account Button -->
      <div class="save-badge" onclick="toggleSave()" title="Simpan Akun">
        <div class="save-btn" id="saveBtn">
          <svg id="saveIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4a6a9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
        </div>
        <span class="save-label" id="saveLabel">SIMPAN</span>
      </div>
    </div>

    <!-- Username -->
    <div class="field">
      <label class="field-label">Username</label>
      <div class="field-wrap">
        <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <input class="field-input" id="username" type="text" placeholder="username kamu" autocomplete="username" autocapitalize="none" spellcheck="false">
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label class="field-label">Password</label>
      <div class="field-wrap">
        <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input class="field-input" id="password" type="password" placeholder="password kamu" autocomplete="current-password">
        <button class="pwd-toggle" id="pwdToggle" type="button" tabindex="-1" onclick="togglePwd()">
          <svg id="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Remember me row -->
    <div class="remember-row">
      <div class="remember-check" onclick="toggleRemember()">
        <div class="custom-check" id="rememberCheck"></div>
        <span class="remember-label">Ingat saya</span>
      </div>
    </div>

    <!-- Login Button -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:6px;vertical-align:middle">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Masuk Sekarang
      </span>
    </button>

  </div>

<div class="social-row">
    <button class="soc-btn tele" onclick="window.location.href='order.html';" style="flex:1;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
      </svg>
      BELI ACCOUNT
    </button>
  </div>
  
  <div class="social-row">
    <button class="soc-btn tele" onclick="window.location.href='helper.html';" style="flex:1;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
      </svg>
      PULIHKAN ACCOUNT
    </button>
  </div>

  <div class="page-footer">
    <span>GENETIC</span>
    <div class="footer-dot"></div>
    <span>2026</span>
    <div class="footer-dot"></div>
    <span>Leonore</span>
  </div>
</div>

<script>
// ── State ──
let rememberMe = false;
let accountSaved = false;

// ── Load saved credentials ──
function loadSaved() {
  const saved = localStorage.getItem('sync_saved_creds');
  if (saved) {
    try {
      const { username, password } = JSON.parse(atob(saved));
      document.getElementById('username').value = username || '';
      document.getElementById('password').value = password || '';
      accountSaved = true;
      updateSaveUI();
      showToast('success', 'Akun Dimuat', 'Kredensial tersimpan berhasil dimuat');
    } catch(e){}
  }
  const rem = localStorage.getItem('sync_remember');
  if (rem === '1') {
    rememberMe = true;
    document.getElementById('rememberCheck').classList.add('checked');
  }
}

function updateSaveUI() {
  const btn = document.getElementById('saveBtn');
  const icon = document.getElementById('saveIcon');
  const lbl = document.getElementById('saveLabel');
  if (accountSaved) {
    btn.classList.add('saved');
    icon.setAttribute('stroke', '#4fc878');
    lbl.textContent = 'TERSIMPAN';
  } else {
    btn.classList.remove('saved');
    icon.setAttribute('stroke', '#4a6a9a');
    lbl.textContent = 'SIMPAN';
  }
}

function toggleSave() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (accountSaved) {
    localStorage.removeItem('sync_saved_creds');
    accountSaved = false;
    updateSaveUI();
    showToast('error', 'Dihapus', 'Data akun tersimpan telah dihapus');
    return;
  }

  if (!username || !password) {
    showToast('error', 'Perlu Isi Dulu', 'Isi username & password sebelum menyimpan');
    return;
  }

  const encoded = btoa(JSON.stringify({ username, password }));
  localStorage.setItem('sync_saved_creds', encoded);
  accountSaved = true;
  updateSaveUI();
  showToast('success', 'Tersimpan!', 'Akun berhasil disimpan di perangkat ini');
}

function toggleRemember() {
  rememberMe = !rememberMe;
  const el = document.getElementById('rememberCheck');
  if (rememberMe) {
    el.classList.add('checked');
    el.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#7eabff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    localStorage.setItem('sync_remember', '1');
  } else {
    el.classList.remove('checked');
    el.innerHTML = '';
    localStorage.removeItem('sync_remember');
  }
}

function togglePwd() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function showToast(type, title, msg) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast' + (type === 'success' ? ' success' : '');
  const iconColor = type === 'success' ? '#4fc878' : '#e05c5c';
  const iconPath = type === 'success'
    ? '<circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/>'
    : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/>';
  t.innerHTML = `
    <div class="toast-icon-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="${iconColor}" stroke-width="2.5">${iconPath}</svg>
    </div>
    <div class="toast-body">
      <div class="toast-title">${title}</div>
      <div class="toast-msg">${msg}</div>
    </div>
    <div class="toast-progress"></div>`;
  wrap.appendChild(t);
  setTimeout(() => {
    t.classList.add('hide');
    setTimeout(() => t.remove(), 220);
  }, 3000);
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!username || !password) {
    showToast('error', 'Gagal Masuk', 'Username Dan Password Tidak Boleh Kosong');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    let deviceId = localStorage.getItem('sync_device_id')
    if (!deviceId) {
      deviceId = Math.random().toString(36).slice(2) + Date.now().toString(36)
      localStorage.setItem('sync_device_id', deviceId)
    }

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, deviceId })
    });
    const data = await res.json();

    if (data.ok) {
      localStorage.setItem('sync_token', data.token);
      localStorage.setItem('sync_user', data.username);
      window.location.href = '/splash.html';
    } else {
      showToast('error', 'Gagal Masuk', data.error || 'Username Atau Password Salah');
      btn.disabled = false;
      btn.classList.remove('loading');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch (err) {
    showToast('error', 'Koneksi Gagal', 'Tidak bisa konek ke server');
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── Keyboard shortcuts ──
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── Init ──
loadSaved();
if (!document.getElementById('username').value) {
  document.getElementById('username').focus();
}
</script>
