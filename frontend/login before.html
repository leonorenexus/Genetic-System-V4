<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SYNC — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Bungee';src:url('Bungee.ttf') format('truetype');font-weight:normal;font-style:normal;font-display:swap;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#05080f;
  --card-bg:#08111e;
  --border:rgba(99,157,255,.12);
  --border2:rgba(99,157,255,.22);
  --border3:rgba(99,157,255,.4);
  --accent:#4f8dff;
  --accent2:#7eabff;
  --accent3:#b8d3ff;
  --glow:rgba(79,141,255,.14);
  --red:#e05c5c;
  --text:#e8f0ff;
  --t2:#4a6a9a;
  --t3:#1a2d4a;
  --mono:'IBM Plex Mono',monospace;
  --display:'Playfair Display',serif;
  --sans:'Syne',sans-serif;
}

html,body{height:100%}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  min-height:100vh;
  font-size:14px;
  -webkit-font-smoothing:antialiased;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  background-image:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(79,141,255,.06) 0%, transparent 70%),
    radial-gradient(ellipse 30% 50% at 85% 60%, rgba(79,141,255,.04) 0%, transparent 60%);
}

body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(79,141,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,141,255,.018) 1px, transparent 1px);
  background-size:52px 52px;
}

.page-wrap{
  position:relative;z-index:1;
  width:100%;
  max-width:420px;
  display:flex;flex-direction:column;
  gap:0;
  animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:none}
}

.banner{
  width:100%;
  aspect-ratio:16/9;
  border-radius:18px 18px 0 0;
  overflow:hidden;
  position:relative;
  border:1px solid var(--border2);
  border-bottom:none;
  flex-shrink:0;
}

.banner img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  filter:brightness(.85) saturate(1.1);
}

.banner-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    rgba(5,8,15,0) 0%,
    rgba(5,8,15,.15) 60%,
    rgba(5,8,15,.75) 100%
  );
}

.banner-brand{
  position:absolute;bottom:18px;left:22px;
  display:flex;align-items:center;gap:12px;
}

.banner-text-group{
  display:flex;flex-direction:column;gap:1px;
}

.banner-name{
  font-family:'Bungee',sans-serif;
  font-size:24px;
  font-weight:normal;
  font-style:normal;
  letter-spacing:2px;
  text-shadow:0 2px 24px rgba(0,0,0,.7);
  line-height:1;
}

.banner-tag{
  font-family:var(--mono);
  font-size:8px;
  color:rgba(184,211,255,.7);
  letter-spacing:3px;
  text-transform:uppercase;
}

.login-card{
  width:100%;
  background:var(--card-bg);
  border:1px solid var(--border2);
  border-top:none;
  border-radius:0 0 20px 20px;
  padding:28px 26px 26px;
  box-shadow:
    0 32px 80px rgba(0,0,0,.7),
    0 0 0 0 transparent,
    inset 0 0 0 1px rgba(255,255,255,.025);
  position:relative;
  overflow:hidden;
}

.login-card::before{
  content:'';
  position:absolute;top:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(79,141,255,.25),transparent);
}

.card-header{
  margin-bottom:24px;
}

.card-title{
  font-family:var(--display);
  font-size:20px;
  font-weight:400;
  font-style:italic;
  color:var(--text);
  letter-spacing:.5px;
  line-height:1.2;
  margin-bottom:5px;
}

.card-sub{
  font-family:var(--mono);
  font-size:9px;
  color:var(--t2);
  letter-spacing:2.5px;
  text-transform:uppercase;
}

.divider{
  width:28px;height:1px;
  background:var(--accent);
  opacity:.4;
  margin:10px 0 0;
}

.field{margin-bottom:14px}

.field-label{
  font-family:var(--sans);
  font-size:10px;
  font-weight:600;
  color:var(--t2);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:7px;
  display:block;
}

.field-wrap{position:relative}

.field-icon{
  position:absolute;left:13px;top:50%;
  transform:translateY(-50%);
  color:var(--t3);
  pointer-events:none;
  transition:color .2s;
}

.field-input{
  width:100%;height:46px;
  background:rgba(79,141,255,.03);
  border:1.5px solid rgba(79,141,255,.1);
  border-radius:11px;
  color:var(--text);
  font-family:var(--mono);font-size:12px;
  padding:0 14px 0 38px;
  outline:none;
  transition:border-color .2s,background .2s,box-shadow .2s;
  letter-spacing:.3px;
  -webkit-appearance:none;
}

.field-input:focus{
  border-color:rgba(79,141,255,.4);
  background:rgba(79,141,255,.05);
  box-shadow:0 0 0 3px rgba(79,141,255,.07);
}

.field-wrap:focus-within .field-icon{color:var(--accent2)}
.field-input::placeholder{color:var(--t3);font-style:italic}

.pwd-toggle{
  position:absolute;right:11px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;padding:5px;
  cursor:pointer;color:var(--t2);
  display:flex;align-items:center;
  transition:color .2s;
}
.pwd-toggle:hover{color:var(--accent2)}

.toast-wrap{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;align-items:center;gap:10px;
  pointer-events:none;width:calc(100% - 40px);max-width:380px;
}
.toast{
  width:100%;
  background:rgba(6,10,20,.96);
  border:1px solid rgba(224,92,92,.2);
  border-left:3px solid #e05c5c;
  border-radius:14px;
  padding:14px 16px;
  display:flex;align-items:flex-start;gap:12px;
  backdrop-filter:blur(24px);
  box-shadow:0 16px 48px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03),0 0 32px rgba(224,92,92,.06);
  animation:toastIn .35s cubic-bezier(.22,1,.36,1) both;
  pointer-events:all;
}
.toast.hide{animation:toastOut .2s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-16px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-8px) scale(.97)}}
.toast-icon-wrap{
  width:28px;height:28px;border-radius:8px;
  background:rgba(224,92,92,.1);
  border:1px solid rgba(224,92,92,.18);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.toast-body{flex:1;min-width:0}
.toast-title{
  font-family:var(--sans);font-size:11px;font-weight:700;
  color:#f08080;letter-spacing:1px;text-transform:uppercase;
  margin-bottom:3px;
}
.toast-msg{
  font-family:var(--mono);font-size:10px;
  color:rgba(220,170,170,.7);letter-spacing:.3px;line-height:1.5;
}
.toast-progress{
  position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,#e05c5c,rgba(224,92,92,.3));
  border-radius:0 0 0 14px;
  animation:toastProgress 3s linear forwards;
}
.toast{position:relative;overflow:hidden}
@keyframes toastProgress{from{width:100%}to{width:0%}}

.btn-login{
  width:100%;height:48px;
  border-radius:12px;
  border:1px solid rgba(79,141,255,.28);
  background:linear-gradient(135deg,rgba(79,141,255,.14) 0%,rgba(79,141,255,.06) 100%);
  color:var(--accent2);
  font-family:var(--sans);font-size:12px;font-weight:700;
  letter-spacing:2.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .18s ease;
  box-shadow:0 4px 24px rgba(79,141,255,.08),inset 0 1px 0 rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;gap:9px;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  margin-top:4px;
}

.btn-login::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(79,141,255,.12),transparent);
  opacity:0;transition:opacity .2s;
}

.btn-login:hover::after{opacity:1}
.btn-login:hover{
  border-color:rgba(79,141,255,.45);
  box-shadow:0 6px 32px rgba(79,141,255,.15),inset 0 1px 0 rgba(255,255,255,.06);
  transform:translateY(-1px);
}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.35;pointer-events:none}

.btn-login .spinner{
  display:none;
  width:15px;height:15px;
  border:1.5px solid rgba(126,171,255,.2);
  border-top-color:var(--accent2);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
.btn-login.loading .spinner{display:block}
.btn-login.loading .btn-text{display:none}

@keyframes spin{to{transform:rotate(360deg)}}

.page-footer{
  text-align:center;
  font-family:var(--mono);font-size:8px;
  color:rgba(74,106,154,.5);
  letter-spacing:2.5px;
  text-transform:uppercase;
  margin-top:20px;
}
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>
<div class="page-wrap">

  <div class="banner">
    <img src="l.jpg" alt="SYNC Banner">
    <div class="banner-overlay"></div>
    <div class="banner-brand">
      <div class="banner-text-group">
        <div class="banner-name"><span style="color:#ffffff">WELCOME</span><span style="color:#4f8dff">BACK</span></div>
        <div class="banner-tag">Created By Leonore</div>
      </div>
    </div>
  </div>

  <div class="login-card">
    <div class="field">
      <label class="field-label">Username</label>
      <div class="field-wrap">
        <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <input class="field-input" id="username" type="text" placeholder="username kamu" autocomplete="username" autocapitalize="none" spellcheck="false">
      </div>
    </div>

    <div class="field">
      <label class="field-label">Password</label>
      <div class="field-wrap">
        <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input class="field-input" id="password" type="password" placeholder="password kamu" autocomplete="current-password">
        <button class="pwd-toggle" id="pwdToggle" type="button" tabindex="-1" onclick="togglePwd()">
          <svg id="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:6px;vertical-align:middle"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Masuk
      </span>
    </button>
  </div>

  <div class="page-footer">GENETIC · 2026 · SMOOTH</div>
</div>

<script>
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus() })
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
document.getElementById('username').focus()

function togglePwd() {
  const inp = document.getElementById('password')
  const icon = document.getElementById('eyeIcon')
  if (inp.type === 'password') {
    inp.type = 'text'
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
  } else {
    inp.type = 'password'
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
  }
}

function showError(msg) {
  const wrap = document.getElementById('toastWrap')
  const t = document.createElement('div')
  t.className = 'toast'
  t.innerHTML = `
    <div class="toast-icon-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#e05c5c" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="3"/>
      </svg>
    </div>
    <div class="toast-body">
      <div class="toast-title">Gagal Masuk</div>
      <div class="toast-msg">${msg}</div>
    </div>
    <div class="toast-progress"></div>`
  wrap.appendChild(t)
  setTimeout(() => {
    t.classList.add('hide')
    setTimeout(() => t.remove(), 220)
  }, 3000)
}

function hideError() {}

async function doLogin() {
  const username = document.getElementById('username').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('loginBtn')

  if (!username || !password) {
    showError('Username Dan Password Tidak Boleh Kosong')
    return
  }

  hideError()
  btn.disabled = true
  btn.classList.add('loading')

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })
    const data = await res.json()

    if (data.ok) {
      localStorage.setItem('sync_token', data.token)
      localStorage.setItem('sync_user', data.username)
      window.location.href = '/dashboard.html'
    } else {
      showError(data.error || 'Username Atau Password Salah')
      btn.disabled = false
      btn.classList.remove('loading')
      document.getElementById('password').value = ''
      document.getElementById('password').focus()
    }
  } catch (err) {
    showError('Tidak bisa konek ke server')
    btn.disabled = false
    btn.classList.remove('loading')
  }
}
</script>
</body>
</html>
